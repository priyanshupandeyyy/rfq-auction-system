name: CI/CD — RFQ Auction System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ─────────────────────────────────────────────────────
  # Job 1: Build & Test Spring Boot Backend
  # ─────────────────────────────────────────────────────
  build-backend:
    name: Build Backend (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests -B

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 5

  # ─────────────────────────────────────────────────────
  # Job 2: Docker Build & Push (backend + frontend)
  # ─────────────────────────────────────────────────────
  docker-push:
    name: Docker Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for Docker multi-stage build)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Backend Image ──────────────────────────────
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rfq-auction-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/rfq-auction-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend Image ─────────────────────────────
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rfq-auction-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/rfq-auction-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ Docker Images Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/rfq-auction-backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/rfq-auction-frontend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
