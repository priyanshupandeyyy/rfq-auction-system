spring.application.name=rfq-auction-backend

# ──────────────────────────────────────────────
# DataSource (overridden by environment in Docker)
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rfq_auction?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=8080

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.com.rfqauction=INFO
logging.level.org.springframework.web=WARN
